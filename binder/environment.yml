name: cil_hyperspy_binder
channels:
  - conda-forge
  - ccpi
  - https://software.repos.intel.com/python/conda
dependencies:
  - astra-toolbox
  - ccpi-regulariser
  - cil
  - exspy
  - hyperspy-base>=2.0
  - hyperspy-gui-ipywidgets>=2.0
  - ipympl
  - libblas=*=*mkl
  - numba
  - numexpr
  - pystackreg
  - scikit-learn
  - scikit-image
  - tomophantom
